<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Calculadora</h1>
    <h2>Controle sobre maturação das bananas</h2>
    <div class="container">
      <div class="caixa1">
        <div class="perguntas">Volume mensal de bananas:</div>
        <input type="number" id="input_qtdBananas" placeholder="Kg" /> <br />
        <div class="perguntas">Atual porcentagem de perda:</div>
        <input type="number" id="input_perda" placeholder="EX 40 ou 60" />
        <br />
        <div class="perguntas">Valor investido:</div>
        <input type="number" id="input_valorCompra" placeholder="R$ por Kg" />
        <br />
        <div class="perguntas">Valor pretendido na venda:</div>
        <input type="number" id="input_valorVenda" placeholder="R$ por Kg" />
        <br />
        <button class="botao_cima" onclick="emitir()">
          Emitir o relatório
        </button>
        <button class="botao_baixo" onclick="reiniciar()">⟳</button>
      </div>

      <div id="div_mensagem"></div>
    </div>
  </body>
</html>
<script>
  let simulacao = 1;

  function reiniciar() {
    div_mensagem.innerHTML = ``;
    simulacao = 1;
  }
  /* resumindo é assim:
  pensa como se nosso produto é uma peneira fina,
  que ao invés da perda por causa da temperatura passar com 20% iria deixar passar só 5%  */

  function emitir() {
    let qtdBananas = Number(input_qtdBananas.value);
    let perda = Number(input_perda.value);
    let valorCompra = Number(input_valorCompra.value);
    let valorVenda = Number(input_valorVenda.value);

    // NOVA LÓGICA DE PORCENTAGEM
    let perdaBase = (perda * 100) / 120; // regra de 3, se perdaTotal = (ex) 60 = 120% da perda base. AQUI DESCOBRE QUAL É A BASE
    let novaPorcentagem = perdaBase + perdaBase * 0.05; //SOMA perdaBase COM + 5% que é oque vai continuar sendo acrescentado

    // PESO (KG)
    let perdaPorCem = qtdBananas * (perda / 100); //calcula quanto ta perdendo sem o projeto
    let novaPerdaKg = qtdBananas * (novaPorcentagem / 100); //perda prevista com o projeto
    let bananasSalvas = perdaPorCem - novaPerdaKg; // faz a conta subtraindo o quanto perdia para o quanto vai perder, para ver a diferença de quanto vai ganhar

    // FINANCEIRO
    let faturamentoAtual = (qtdBananas - perdaPorCem) * valorVenda; //quanto fatura sem o projeto
    let faturamentoPrevisto = (qtdBananas - novaPerdaKg) * valorVenda; // faturamento previsto com o projeto
    let lucroExtra = bananasSalvas * valorVenda; // multiplica quantidade de bananas salva com o projeto pelovalor de venda pretendidio

    //aqui não tem segredo. é nois
    div_mensagem.innerHTML += ` <br> <b>Simulação: ${simulacao}</b> <br>
    Com nosso projeto, reduzimos o impacto da temperatura na sua perda.<br>
    Sua perda total cai de
    <b style="color:red">${perda}%</b> para <b style="color:green">${novaPorcentagem}%</b>.<br><br>

    Isso evita o desperdício de <b>${bananasSalvas} kg</b> de bananas mensalmente.<br><br>
 
    <b style="color:red">R$ ${faturamentoAtual}</b> = Seu faturamento atual.<br>
    <b style="color:green">R$ ${faturamentoPrevisto} </b>
    = Seu faturamento com <b style="color:#deb500">BananAPI</b>. <br>
    Faturamento recuperado: <b style="color:green">R$ ${lucroExtra}</b> <br><br>`;

    simulacao++;
  }
</script>
