<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
  </head>
  <body>
    <h1>Calculadora</h1>

    Informe o mês para emitir o relátorio: <br />
    <input type="text" id="input_mes" /> <br />
    Informe a quantidade de bananas, em quilos, recebidas no entreposto: <br />
    <input type="number" id="input_qtdBananas" /> <br />
    Informe a quantidade de câmaras do entreposto: <br />
    <input type="number" id="input_qtdCamara" /> <br />
    Informe a capacidade máxima de banana por câmara, em quilos: <br />
    <input type="number" id="input_capacidadeMax" /> <br />
    Informe o valor de venda do kilo: <br />
    <input type="number" id="input_valorVenda" /> <br />

    <button onclick="emitir()">Emitir o relátorio</button>

    <div id="div_mensagem"></div>
  </body>
</html>
<script>
  function emitir() {
    let bananas = Number(input_qtdBananas.value);
    let camaras = Number(input_qtdCamara.value);
    let qtdcamaras = Number(input_qtdCamara.value);
    let valor = Number(input_valorVenda.value);
    let mes = input_mes.value;

    let distribuicao = bananas / qtdcamaras;
    let aproveitamento = bananas * 0.15;
    let vendasaproveitadas = valor * aproveitamento;
    let vendas = bananas * 0.95 * valor;

    div_mensagem.innerHTML += `<p> Relatório de ${mes} <br>
     Neste mês, seu entreposto recebeu ${bananas} kg de Banana Nanica. <br>
     Deste total, haviam ${distribuicao} kg por câmara de resfriamento. <br>
     O aproveitamento de produto com o nosso serviço instalado foi de ${aproveitamento}, aproximadamente 15%. <br>
     resultando em R$ ${vendasaproveitadas}. <br>
     Lucro total: R$${vendas}`;
  }
</script>
